<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicVoice — Profile</title>
    <meta name="description" content="Manage your CivicVoice profile and change your password.">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Profile specific styles */
        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-card);
            max-width: 500px;
            margin: 40px auto;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.3);
        }

        .profile-email {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .profile-role {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .profile-section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <!-- Animated Background Orbs -->
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- ───── NAVBAR ───── -->
    <nav class="navbar">
        <a href="#" class="navbar__brand" id="brandLink">
            <div class="navbar__brand-icon">🔥</div>
            CivicVoice
        </a>
        <div class="navbar__actions">
            <a href="#" class="navbar__btn navbar__btn--outline" id="backBtn">
                ← Back
            </a>
        </div>
    </nav>

    <!-- ───── PROFILE LAYOUT ───── -->
    <div class="layout" style="display:block;">
        <main class="feed">
            <div class="profile-card">

                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-email" id="userEmail">Loading...</div>
                    <div class="profile-role" id="userRole">Loading...</div>
                </div>

                <div class="profile-section-title">Change Password</div>

                <form id="passwordForm">
                    <div class="form-group">
                        <label class="form-label" for="currentPassword">Current Password</label>
                        <input class="form-input" type="password" id="currentPassword" required
                            placeholder="Enter current password">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="newPassword">New Password</label>
                        <input class="form-input" type="password" id="newPassword" required
                            placeholder="Enter new password (min 6 chars)">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmPassword">Confirm New Password</label>
                        <input class="form-input" type="password" id="confirmPassword" required
                            placeholder="Confirm new password">
                    </div>

                    <button type="submit" class="btn btn--accent"
                        style="width:100%; justify-content:center; margin-top:10px;" id="updateBtn">
                        Update Password
                    </button>
                </form>

            </div>
        </main>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- JS -->
    <script type="module">
        import { auth, db } from './js/firebase.js';
        import { onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#d63031' : '#00b894';
            toast.style.color = '#fff';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        let currentUserDoc = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }

            document.getElementById('userEmail').textContent = user.email;

            try {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (uDoc.exists()) {
                    currentUserDoc = uDoc.data();
                    document.getElementById('userRole').textContent = currentUserDoc.role;

                    // Theme switching
                    if (currentUserDoc.role === "Admin" || currentUserDoc.role === "Faculty") {
                        document.body.classList.add('admin-dark');
                        document.getElementById('backBtn').href = "admin.html";
                        document.getElementById('brandLink').href = "admin.html";
                    } else {
                        document.getElementById('backBtn').href = "dashboard.html";
                        document.getElementById('brandLink').href = "dashboard.html";
                    }
                }
            } catch (err) {
                console.error("Error fetching user role", err);
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                showToast("New passwords do not match!", true);
                return;
            }

            if (newPass.length < 6) {
                showToast("New password must be at least 6 characters.", true);
                return;
            }

            const btn = document.getElementById('updateBtn');
            btn.disabled = true;
            btn.textContent = "Updating...";

            try {
                const user = auth.currentUser;
                const credential = EmailAuthProvider.credential(user.email, current);

                // Re-authenticate
                await reauthenticateWithCredential(user, credential);

                // Update password
                await updatePassword(user, newPass);

                showToast("Password updated successfully!");
                document.getElementById('passwordForm').reset();
            } catch (err) {
                console.error(err);
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                    showToast("Incorrect current password.", true);
                } else {
                    showToast(err.message || "Failed to update password.", true);
                }
            } finally {
                btn.disabled = false;
                btn.textContent = "Update Password";
            }
        });
    </script>

</body>

</html>
