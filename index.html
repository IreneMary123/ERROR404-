<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Voice | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4adadbb6df.js" crossorigin="anonymous"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* card */
.auth-card{
  width:380px;
  background:white;
  border-radius:18px;
  padding:40px 32px;
  box-shadow:0 20px 50px rgba(0,0,0,0.08);
  text-align:center;
}

/* icon */
.logo-box{
  width:60px;
  height:60px;
  background:#1e2b4f;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 18px;
}

.logo-box i{
  color:white;
  font-size:22px;
}

/* headings */
h1{
  margin:0;
  font-size:26px;
  color:#0f172a;
}

.subtitle{
  color:#64748b;
  margin:8px 0 28px;
  font-size:14px;
}

/* inputs */
.input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #e2e8f0;
  margin-bottom:16px;
  font-size:14px;
  outline:none;
}

.input:focus{
  border-color:#1e2b4f;
}

/* button */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1e2b4f;
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
  transition:.25s;
}

.btn:hover{
  background:#16213e;
}

/* toggle text */
.toggle{
  margin-top:18px;
  font-size:14px;
  color:#64748b;
  cursor:pointer;
}

.toggle b{
  color:#1e2b4f;
}
</style>
</head>

<body>

<div class="auth-card">

  <div class="logo-box">
    <i class="fas fa-paper-plane"></i>
  </div>

  <h1>Student Voice</h1>
  <div class="subtitle">Register with your @mgits.ac.in email</div>

  <!-- REGISTER -->
  <form id="registerForm">
    <input class="input" type="email" placeholder="Email" required>
    <input class="input" type="password" placeholder="Password" required>

    <select id="roleSelect" class="input">
      <option value="Student">Student</option>
      <option value="Faculty">Faculty</option>
    </select>

    <button class="btn" type="submit">
      <i class="fas fa-user-plus"></i> Sign Up
    </button>
  </form>

  <!-- LOGIN -->
  <form id="loginForm" style="display:none;">
    <input class="input" type="email" placeholder="Email" required>
    <input class="input" type="password" placeholder="Password" required>

    <button class="btn" type="submit">
      <i class="fas fa-right-to-bracket"></i> Sign In
    </button>
  </form>

  <div class="toggle" id="toggleText">
    Already have an account? <b>Sign In</b>
  </div>

</div>

<script type="module" src="./js/auth.js"></script>

<script>
const registerForm = document.getElementById("registerForm");
const loginForm = document.getElementById("loginForm");
const toggleText = document.getElementById("toggleText");

toggleText.addEventListener("click",()=>{
  const isLogin = loginForm.style.display === "block";

  loginForm.style.display = isLogin ? "none" : "block";
  registerForm.style.display = isLogin ? "block" : "none";

  toggleText.innerHTML = isLogin
    ? 'Already have an account? <b>Sign In</b>'
    : "Don't have an account? <b>Register</b>";
});
</script>

</body>
</html>
