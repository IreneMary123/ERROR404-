<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicVoice — Login</title>
  <meta name="description"
    content="CivicVoice — your community complaint platform. Sign in to upvote and submit complaints.">
  <link rel="stylesheet" href="css/styles.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body class="auth-page">

  <!-- Animated Background Orbs -->
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="auth-card">

    <div class="auth-card__logo">🔥</div>

    <h1>CivicVoice</h1>

    <!-- Tabs: Admin tab only shown in login mode -->
    <div class="auth-tabs" style="display:flex; gap:8px; margin-bottom:24px;">
      <button class="auth-tab active" id="tabStudent"
        style="flex:1; padding:10px; border-radius:8px; border:none; background:#6c5ce7; color:white; font-weight:600; cursor:pointer; transition:all 0.2s;">Student</button>
      <button class="auth-tab" id="tabAdmin"
        style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd; background:transparent; color:#6b7280; font-weight:600; cursor:pointer; transition:all 0.2s; display:none;">Admin</button>
    </div>

    <div class="auth-card__subtitle" id="authSubtitle">Student Portal — Register with @mgits.ac.in</div>

    <!-- REGISTER FORM (Students only) -->
    <form id="registerForm">
      <input class="form-input" type="email" placeholder="Email address" required>
      <input class="form-input" type="password" placeholder="Password (min 6 characters)" required>

      <!-- Hidden field for role — always Student on signup -->
      <input type="hidden" id="selectedRole" value="Student">

      <button class="btn btn--accent btn--full" style="margin-bottom:12px;" type="submit">
        Sign Up
      </button>
    </form>

    <!-- LOGIN FORM -->
    <form id="loginForm" style="display:none;">
      <input class="form-input" type="email" placeholder="Email address" required>
      <input class="form-input" type="password" placeholder="Password" required>

      <button class="btn btn--accent btn--full" style="margin-bottom:12px;" type="submit">
        Sign In
      </button>
    </form>

    <div class="auth-card__toggle" id="toggleText"
      style="text-align:center; font-size:14px; color:#6b7280; cursor:pointer;">
      Already have an account? <b style="color:#6c5ce7;">Sign In</b>
    </div>

  </div>

  <script type="module" src="js/auth.js?v=2"></script>

  <script>
    const registerForm = document.getElementById("registerForm");
    const loginForm = document.getElementById("loginForm");
    const toggleText = document.getElementById("toggleText");
    const authSubtitle = document.getElementById("authSubtitle");

    // Tabs
    const tabStudent = document.getElementById("tabStudent");
    const tabAdmin = document.getElementById("tabAdmin");
    const selectedRole = document.getElementById("selectedRole");

    let isLoginMode = false;
    let currentTab = "Student";

    function updateUI() {
      // Both tabs visible in both login and signup modes
      tabAdmin.style.display = "block";


      // 1. Update Tabs visuals
      if (currentTab === "Student") {
        tabStudent.style.background = "#6c5ce7";
        tabStudent.style.color = "white";
        tabStudent.style.border = "none";
        tabAdmin.style.background = "transparent";
        tabAdmin.style.color = "#6b7280";
        tabAdmin.style.border = "1px solid #ddd";
      } else {
        tabAdmin.style.background = "#d63031";
        tabAdmin.style.color = "white";
        tabAdmin.style.border = "none";
        tabStudent.style.background = "transparent";
        tabStudent.style.color = "#6b7280";
        tabStudent.style.border = "1px solid #ddd";
      }

      // Set role: Admin login uses Faculty role stored in Firestore
      selectedRole.value = currentTab === "Admin" ? "Faculty" : "Student";

      // 2. Update Forms visibility
      loginForm.style.display = isLoginMode ? "block" : "none";
      registerForm.style.display = isLoginMode ? "none" : "block";

      // 3. Update Text
      if (isLoginMode) {
        authSubtitle.textContent = currentTab === "Student"
          ? "Student Portal — Welcome back"
          : "Admin Portal — Sign In";
        toggleText.innerHTML = "Don't have an account? <b style='color:#6c5ce7;'>Register</b>";
      } else {
        authSubtitle.textContent = "Student Portal — Register with @mgits.ac.in";
        toggleText.innerHTML = "Already have an account? <b style='color:#6c5ce7;'>Sign In</b>";
      }

      // 4. Update Button Colors
      const accentBtn = loginForm.querySelector('.btn--accent');
      const regBtn = registerForm.querySelector('.btn--accent');
      if (currentTab === "Admin") {
        accentBtn.style.background = "#d63031";
        regBtn.style.background = "#d63031";
      } else {
        accentBtn.style.background = "#6c5ce7";
        regBtn.style.background = "#6c5ce7";
      }
    }

    tabStudent.addEventListener("click", () => {
      currentTab = "Student";
      updateUI();
    });

    tabAdmin.addEventListener("click", () => {
      currentTab = "Admin";
      updateUI();
    });

    toggleText.addEventListener("click", () => {
      isLoginMode = !isLoginMode;
      updateUI();
    });

    // Initialize UI
    updateUI();
  </script>

</body>

</html>
