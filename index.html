<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplaintPortal | MGITS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/4adadbb6df.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="blob"></div>
<div class="blob"></div>

<div class="container" id="card">
  <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>

  <div class="brand">ComplaintPortal</div>
  <div class="subtitle">MGITS Official Complaint Management System</div>

  <!-- Register -->
  <form id="registerForm" class="active">
    <div class="input-group"><i class="fas fa-envelope"></i>
      <input type="email" placeholder=" " required>
      <label>Email (@mgits.ac.in)</label>
    </div>
    <div class="input-group"><i class="fas fa-lock"></i>
      <input type="password" placeholder=" " required>
      <label>Password</label>
    </div>
    <div class="input-group">
      <select id="roleSelect">
        <option value="Student">Student</option>
        <option value="Faculty">Faculty</option>
      </select>
    </div>
    <button type="submit">Create Account</button>
  </form>

  <!-- Login -->
  <form id="loginForm">
    <div class="input-group"><i class="fas fa-envelope"></i>
      <input type="email" placeholder=" " required>
      <label>Email (@mgits.ac.in)</label>
    </div>
    <div class="input-group"><i class="fas fa-lock"></i>
      <input type="password" placeholder=" " required>
      <label>Password</label>
    </div>
    <button type="submit">Login</button>
  </form>

  <div class="toggle" id="toggleText">Already have an account? <b>Login</b></div>
</div>

<script type="module" src="./js/auth.js"></script>
<script>
const registerForm = document.getElementById("registerForm");
const loginForm = document.getElementById("loginForm");
const toggleText = document.getElementById("toggleText");
const card = document.getElementById("card");
const themeToggle = document.getElementById("themeToggle");

toggleText.addEventListener("click",()=>{
  registerForm.classList.toggle("active");
  loginForm.classList.toggle("active");
  toggleText.innerHTML = loginForm.classList.contains("active") ? `Don't have an account? <b>Register</b>` : `Already have an account? <b>Login</b>`;
});

card.addEventListener("mouseenter",()=>{card.style.transform="translateY(-8px)"; card.style.boxShadow="0 40px 90px rgba(0,0,0,0.2)";});
card.addEventListener("mouseleave",()=>{card.style.transform="translateY(0px)"; card.style.boxShadow="0 30px 80px rgba(0,0,0,0.15)";});
themeToggle.addEventListener("click",()=>{document.body.classList.toggle("dark");});
</script>
</body>
</html>
