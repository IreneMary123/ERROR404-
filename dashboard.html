<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Voice Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#f5f7fb;
}

/* navbar */
.navbar{
  background:white;
  padding:18px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.brand{
  font-weight:700;
  font-size:20px;
  color:#1e2b4f;
}

.nav-right button{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:500;
}

.submit-btn{
  background:#1e2b4f;
  color:white;
}

.logout-btn{
  background:#ef4444;
  color:white;
}

/* container */
.container{
  max-width:1100px;
  margin:30px auto;
  padding:0 20px;
}

/* grid */
.complaints-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

/* card */
.card{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
}

.card h3{
  margin:0 0 8px;
  font-size:18px;
}

.meta{
  font-size:13px;
  color:#64748b;
  margin-bottom:10px;
}

.vote-btn{
  background:#10b981;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="brand">Student Voice</div>
  <div class="nav-right">
    <button class="submit-btn" onclick="location.href='submit.html'">
      + Submit
    </button>
    <button class="logout-btn" onclick="logoutUser()">Logout</button>
  </div>
</div>

<div class="container">
  <div id="complaintList" class="complaints-grid"></div>
</div>

<script type="module">
import "./js/complaints.js";
import { logoutUser } from "./js/auth.js";

window.logoutUser = logoutUser;
window.loadComplaints();
</script>

</body>
</html>
