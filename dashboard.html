<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
<style>
body{font-family:'Inter',sans-serif; background:linear-gradient(135deg,#f8f5f2,#efe8df); margin:0;}
.container{max-width:1000px;margin:40px auto;padding:30px;border-radius:25px;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,0.1);}
h1{text-align:center;color:#4b3f34;margin-bottom:20px;}
.submit-btn{position:fixed;top:30px;right:30px;background:#cbb9a7;color:white;padding:12px 20px;border-radius:12px;border:none;cursor:pointer;font-weight:600;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.submit-btn:hover{background:#a58e7a;}
#searchBox, #categoryFilter{margin:10px 5px;padding:8px;border-radius:8px;border:none;outline:none;}
.complaints-grid{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px;}
.card{flex:1 1 45%;background:rgba(255,255,255,0.85);border-radius:15px;padding:15px;box-shadow:0 6px 18px rgba(0,0,0,0.08);transition:0.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 12px 25px rgba(0,0,0,0.15);}
.card h3{margin-top:0;color:#111827;}
.card p{font-size:14px;color:#4b5563;margin:4px 0;}
.card button{background:#10b981;color:white;border:none;padding:6px 12px;border-radius:6px;margin-top:8px;cursor:pointer;}
.card button:hover{background:#059669;}
.logout-btn{display:block;width:120px;margin:30px auto 0;background:#ef4444;color:white;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;}
.logout-btn:hover{background:#b91c1c;}
@media screen and (max-width:700px){.complaints-grid{flex-direction:column;}.card{flex:1 1 100%;}}
</style>
</head>
<body onload="loadComplaints()">
<div class="container">
<h1>All Complaints</h1>
<input type="text" id="searchBox" placeholder="Search complaints">
<select id="categoryFilter">
  <option value="">All Categories</option>
  <option value="Academics">Academics</option>
  <option value="Facilities">Facilities</option>
  <option value="Other">Other</option>
</select>
<div id="complaintList" class="complaints-grid"></div>
<button class="logout-btn" id="logoutBtn">Logout</button>
<button class="submit-btn" id="goSubmitBtn">Submit Complaint</button>
</div>

<script type="module">
import { auth } from './js/firebase.js';
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { loadComplaints, upvote } from './js/complaints.js';

document.getElementById("logoutBtn").addEventListener("click", async()=>{await signOut(auth); window.location.href="index.html";});
document.getElementById("goSubmitBtn").addEventListener("click", ()=>{window.location.href="submit.html";});
document.getElementById("searchBox").addEventListener("input", loadComplaints);
document.getElementById("categoryFilter").addEventListener("change", loadComplaints);

window.upvote = upvote;
window.loadComplaints = loadComplaints;
</script>
</body>
</html>
