<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicVoice — Community Complaints</title>
  <meta name="description"
    content="Browse, upvote, and track community complaints. Most voted issues get highest priority.">
  <link rel="stylesheet" href="css/styles.css?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <!-- Animated Background Orbs -->
  <div class="bg-orbs">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- ───── NAVBAR ───── -->
  <nav class="navbar">
    <a href="dashboard.html" class="navbar__brand">
      <div class="navbar__brand-icon">🔥</div>
      CivicVoice
    </a>

    <div class="navbar__search">
      <input type="text" id="searchInput" placeholder="Search complaints…" autocomplete="off">
    </div>

    <div class="navbar__actions">
      <a href="submit.html" class="navbar__btn navbar__btn--primary" id="createPostBtn">
        <span class="btn-icon">+</span>
        <span class="btn-text">Create Post</span>
      </a>
      <a href="admin.html" class="navbar__btn navbar__btn--outline" id="adminLink" style="display:none;">
        <span>Admin</span>
      </a>
      <a href="profile.html" class="navbar__btn navbar__btn--outline" id="profileLink">
        <span>👤 Profile</span>
      </a>
      <button class="navbar__btn navbar__btn--danger" id="logoutBtn">
        Logout
      </button>
    </div>
  </nav>

  <!-- ───── MAIN LAYOUT ───── -->
  <div class="layout">

    <!-- FEED COLUMN -->
    <main class="feed">

      <!-- Sort Bar -->
      <div class="sort-bar">
        <button class="sort-bar__btn active" data-sort="hot" id="sortHot">
          🔥 Hot
        </button>
        <button class="sort-bar__btn" data-sort="top" id="sortTop">
          ⬆️ Top
        </button>
        <button class="sort-bar__btn" data-sort="new" id="sortNew">
          🕐 New
        </button>
      </div>

      <!-- Complaint feed -->
      <div id="complaintList">
        <div class="loading-spinner"></div>
      </div>

    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <!-- About widget -->
      <div class="widget">
        <div class="widget__header">About CivicVoice</div>
        <div class="widget__body">
          <p style="font-size:14px;color:var(--text-secondary);margin-bottom:12px;">
            A community-driven platform to raise, upvote, and resolve complaints anonymously. The more votes a complaint
            gets, the
            higher its priority!
          </p>
          <a href="submit.html" class="btn btn--accent btn--full">Submit a Complaint</a>
        </div>
      </div>

      <!-- Category Filter -->
      <div class="widget">
        <div class="widget__header">Filter by Category</div>
        <div class="widget__body">
          <div class="category-pills" id="categoryFilter">
            <button class="category-pill active" data-category="all">All</button>
            <button class="category-pill" data-category="Infrastructure">Infrastructure</button>
            <button class="category-pill" data-category="Academic">Academic</button>
            <button class="category-pill" data-category="Hostel">Hostel</button>
            <button class="category-pill" data-category="Food">Food</button>
            <button class="category-pill" data-category="Transport">Transport</button>
            <button class="category-pill" data-category="IT/Network">IT/Network</button>
            <button class="category-pill" data-category="Other">Other</button>
          </div>
        </div>
      </div>

      <!-- Stats widget -->
      <div class="widget">
        <div class="widget__header">Community Stats</div>
        <div class="widget__body">
          <div class="stat-row">
            <span class="stat-row__label">Total Complaints</span>
            <span class="stat-row__value" id="statTotal">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-row__label">Pending</span>
            <span class="stat-row__value" style="color:#e17055" id="statPending">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-row__label">Resolved</span>
            <span class="stat-row__value" style="color:var(--badge-resolved)" id="statResolved">—</span>
          </div>
        </div>
      </div>

    </aside>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- JS -->
  <script type="module" src="js/complaints.js?v=2"></script>

</body>

</html>
