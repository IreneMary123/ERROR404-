<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submit Complaint</title>
<link rel="stylesheet" href="css/styles.css">
<style>
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#f8f5f2,#efe8df);margin:0;}
.container{max-width:600px;margin:50px auto;padding:30px;border-radius:25px;background:rgba(255,255,255,0.85);backdrop-filter:blur(20px);box-shadow:0 20px 50px rgba(0,0,0,0.1);}
h1{text-align:center;color:#4b3f34;}
input,textarea,select{width:100%;margin:8px 0;padding:12px;border-radius:10px;border:none;outline:none;background:rgba(255,255,255,0.7);}
button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#cbb9a7,#a58e7a);color:white;font-weight:600;cursor:pointer;margin-top:10px;}
button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15);}
.back-btn{margin-top:15px;background:#ef4444;}
</style>
</head>
<body>
<div class="container">
<h1>Submit Complaint</h1>
<input type="text" id="title" placeholder="Title">
<textarea id="desc" placeholder="Description" rows="5"></textarea>
<input type="text" id="cat" placeholder="Category">
<button id="submitBtn">Submit Complaint</button>
<button class="back-btn" id="backBtn">Back to Dashboard</button>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.getElementById("submitBtn").addEventListener("click", async()=>{
  const title=document.getElementById("title").value;
  const desc=document.getElementById("desc").value;
  const cat=document.getElementById("cat").value;
  if(!title||!desc||!cat){alert("Fill all fields"); return;}
  await addDoc(collection(db,"complaints"),{title,description:desc,category:cat,created_by:auth.currentUser.email,votes:0,status:"Pending",created_at:serverTimestamp()});
  alert("Complaint submitted!");
  window.location.href="dashboard.html";
});
document.getElementById("backBtn").addEventListener("click",()=>{window.location.href="dashboard.html";});
</script>
</body>
</html>
