<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  background:#f3f4f6;
  margin:0;
  padding:40px;
}

h1{
  margin-bottom:20px;
}

.stats{
  display:flex;
  gap:20px;
  margin-bottom:30px;
}

.stat{
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
  flex:1;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

button{
  background:#10b981;
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="stats">
  <div class="stat">Total: <span id="total"></span></div>
  <div class="stat">Pending: <span id="pending"></span></div>
  <div class="stat">Resolved: <span id="resolved"></span></div>
</div>

<div id="complaintList"></div>

<script type="module">
import { db } from './js/firebase.js';
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

export async function loadAdminData(){
  const snapshot = await getDocs(collection(db,"complaints"));
  let total=0,pending=0,resolved=0;
  const container=document.getElementById("complaintList");
  container.innerHTML="";

  snapshot.forEach(docSnap=>{
    total++;
    const data=docSnap.data();
    if(data.status==="Pending") pending++;
    if(data.status==="Resolved") resolved++;

    container.innerHTML += `
      <div class="card">
        <h3>${data.title}</h3>
        <p>${data.description}</p>
        <p><b>Category:</b> ${data.category}</p>
        <p><b>Submitted by:</b> ${data.created_by}</p>
        <p><b>Status:</b> ${data.status}</p>
        ${data.status==="Pending"?`<button onclick="resolve('${docSnap.id}')">Resolve</button>`:""}
      </div>
    `;
  });

  document.getElementById("total").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("resolved").innerText=resolved;
}

async function resolve(id){
  await updateDoc(doc(db,"complaints",id),{status:"Resolved"});
  loadAdminData();
}

window.resolve=resolve;
window.loadAdminData=loadAdminData;

loadAdminData();
</script>

</body>
</html>
